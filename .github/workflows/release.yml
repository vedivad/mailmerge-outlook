name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          python -m PyInstaller
          --onedir --windowed
          --icon=favicon.ico
          --name MailMerge
          --add-data "data/templates;data/templates"
          --add-data "data/contacts.csv;data"
          --add-data "translations;translations"
          --add-data "favicon.ico;."
          main.py

      - name: Zip portable build
        run: Compress-Archive -Path dist\MailMerge\* -DestinationPath dist\MailMerge-Portable.zip
        shell: pwsh

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MailMerge-Portable.zip
            Output/MailMerge-Setup.exe

  build-linux:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller (Linux)
        run: >
          python -m PyInstaller
          --onedir --windowed
          --name MailMerge
          --add-data "data/templates:data/templates"
          --add-data "data/contacts.csv:data"
          --add-data "translations:translations"
          --add-data "favicon.ico:."
          main.py

      - name: Pack Linux portable build
        run: tar -C dist -czf dist/MailMerge-linux-x86_64.tar.gz MailMerge

      - name: Upload Linux artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MailMerge-linux-x86_64.tar.gz
